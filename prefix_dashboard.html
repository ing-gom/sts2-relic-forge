<style>

.legend{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px}
.chip{border:1px solid var(--line);border-radius:6px;padding:3px 8px;font-size:12px;background:var(--panel)}
.chip b{color:var(--gold)}.chip .pk{color:var(--mut)}.chip.neg b{color:var(--red)}
.chip.comp b{color:var(--green)}

.comps h2{margin:0 0 3px;font-size:13px;color:var(--fg)}
.comps .note{color:var(--mut);font-size:11px;margin-bottom:7px}
.comps .grid{display:flex;flex-wrap:wrap;gap:6px}
.comps .card{border:1px solid var(--line);border-radius:6px;padding:5px 9px;background:var(--panel);font-size:12px}
.comps .card b{color:var(--green)}.comps .card.pen b{color:var(--red)}.comps .card .ef{color:var(--fg)}
.comps .card .meta{color:var(--mut);font-size:11px;display:block;margin-top:2px}
.comps .role{border:1px solid var(--line);border-radius:8px;padding:0 5px;font-size:10px;color:var(--mut);margin-left:4px}
.controls{display:flex;gap:14px;align-items:center;margin-top:12px;flex-wrap:wrap}
input[type=search]{background:var(--panel);border:1px solid var(--line);color:var(--fg);border-radius:6px;padding:7px 10px;min-width:260px}
label.tg{color:var(--mut);font-size:12px;display:flex;gap:5px;align-items:center;cursor:pointer}
.wrap{overflow:auto;max-height:calc(100vh - 220px)}
table{border-collapse:separate;border-spacing:0;width:100%}
th,td{padding:5px 9px;border-bottom:1px solid var(--line);white-space:nowrap;text-align:right}
th{position:sticky;top:0;background:var(--panel);z-index:3;font-size:11px;color:var(--mut)}
th.kh{color:var(--fg)}th .pk{display:block;color:var(--mut);font-weight:400;font-size:10px}
td.l,th.l{text-align:left}
.relic{font-weight:600}.rid{color:var(--mut);font-size:10px;font-weight:400}
.var{color:var(--mut)}.vn{color:var(--gold);font-size:11px;margin-left:4px}
.dir{font-size:11px;padding:1px 6px;border-radius:10px;border:1px solid var(--line)}
.up{color:var(--green)}.down{color:var(--gold)}

.buff{background:var(--greenbg);color:var(--green)}.nerf{background:var(--redbg);color:var(--red)}
.d{color:var(--mut);font-size:11px;margin-left:3px}

tbody tr:hover td{background:#232733}
.count{color:var(--mut);font-size:12px;margin-top:6px}

<header>
<h1>⚒ Relic Forge — 접두사 효과 대시보드</h1>
<div class="sub">적용 대상 209개 유물 · 테라리아식 접두사. 공식 max(1, round(기본×|%|)) · 방향별 적용. 색은 <b class="up">이득=초록</b> / <b style="color:var(--red)">손해=빨강</b>. ▲효과 / ▼조건·하락(수치가 낮을수록 좋은 var). 접두사 미적용 기본 60%(ModConfig). 확률은 수치+동반 접두사 통합 풀 기준.</div>
<div class="legend" id="legend"></div>
<div class="comps">

 <div class="grid" id="companions"></div>
</div>
<div class="controls">
 <input id="q" type="search" placeholder="유물 검색 (한글/영문: 닻, anchor, 조율기…)">

 <label class="tg"><input type="checkbox" id="showDelta" checked> 증감량 표시</label>
</div>
<div class="count" id="count"></div>
</header>

<thead><tr id="head"></tr></thead><tbody id="body"></tbody>

function apply(base,pct,dir,amp,boost){const mag=Math.floor(Math.abs(base*pct*(boost||1))+0.5);if(amp)return Math.max(1,base+mag);const s=pct>=0?mag:-mag;return Math.max(1,dir==="INCREASE"?base+s:base-s);}
function isBuff(base,nv,dir){return dir==="INCREASE"?nv>base:nv<base;}
document.getElementById("legend").innerHTML=DATA.prefixes.map(x=>`<span class="chip ${x.pct<0?'neg':''}"><b>${x.ko}</b> <span class="pk">${x.name} · ${x.pct>=0?'+':''}${Math.round(x.pct*100)}% · ${x.prob}%</span></span>`).join("");
document.getElementById("companions").innerHTML=(DATA.companions||[]).map(c=>`<span class="card${c.donorKo?'':' pen'}"><b>${c.ko}</b><span class="role">${c.role}</span> <span class="ef">${c.note}</span><span class="meta">${c.donorKo?c.donorKo+' 효과 · ':''}${c.prob}%</span></span>`).join("");
function activePrefixes(){const hn=document.getElementById("hideNeg").checked;return DATA.prefixes.filter(x=>!(hn&&x.pct<0));}
function render(){
  const q=document.getElementById("q").value.trim().toLowerCase();
  const showD=document.getElementById("showDelta").checked;
  const P=activePrefixes();
  document.getElementById("head").innerHTML=`<th class="l s0">유물</th><th class="l">능력치</th><th>방향</th><th>기본</th>`+P.map(x=>`<th class="kh">${x.ko}<span class="pk">${x.pct>=0?'+':''}${Math.round(x.pct*100)}%</span></th>`).join("");
  let rows=DATA.rows;
  if(q) rows=rows.filter(r=>r.relic.toLowerCase().includes(q)||(r.relicKo||"").toLowerCase().includes(q));
  let html="",last=null,relics=new Set();
  for(const r of rows){
    relics.add(r.relic);const first=r.relic!==last;last=r.relic;
    let cells="";
    for(const x of P){
      let nv,buff;
      if(r.bespoke){nv=r.vals[x.name];buff=nv>r.base;} else {nv=apply(r.base,x.pct,r.dir,x.amp,r.boost);buff=isBuff(r.base,nv,r.dir);}
      const dv=nv-r.base;let c="cell";if(dv!==0)c+=buff?" buff":" nerf";
      const dl=(showD&&dv!==0)?`<span class="d">${dv>0?'+':''}${dv}</span>`:"";
      cells+=`<td class="${c}">${nv}${dl}</td>`;
    }
    const dt=r.bespoke?'<span class="dir" style="color:var(--gold)">⚒ 보너스</span>':(r.dir==="INCREASE"?'<span class="dir up">▲ 효과</span>':'<span class="dir down">▼ 조건·하락</span>');
    const relCell=first?`<span class="relic">${r.relicKo}</span> <span class="rid">${r.relic}</span>`:"";
    const varCell=`${r.varKo}${r.note?`<span class="vn">· ${r.note}</span>`:""}`;
    html+=`<tr><td class="l s0">${relCell}</td><td class="l var">${varCell}</td><td>${dt}</td><td class="base">${r.base}</td>${cells}</tr>`;
  }
  document.getElementById("body").innerHTML=html;
  document.getElementById("count").textContent=`${relics.size} 유물 · ${rows.length} 항목 표시`;
}
