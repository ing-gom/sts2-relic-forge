<!doctype html><html><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Relic Forge — Prefix Dashboard</title>
<style>
:root{--bg:#14161c;--panel:#1c1f28;--line:#2b2f3a;--fg:#e6e8ee;--mut:#9aa3b2;
--green:#43c06a;--greenbg:#173023;--red:#e05b5b;--redbg:#31191b;--gold:#e8c15a;}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--fg);font:14px/1.4 system-ui,"Segoe UI",Roboto,"Malgun Gothic","Microsoft YaHei",sans-serif}
header{padding:16px 20px;border-bottom:1px solid var(--line);background:var(--bg);z-index:5}
h1{margin:0 0 4px;font-size:18px}.sub{color:var(--mut);font-size:12px;max-width:960px}
.topbar{display:flex;justify-content:space-between;align-items:flex-start;gap:12px}
.langsel{display:flex;gap:6px;align-items:center;flex-shrink:0}
.langsel select{background:var(--panel);border:1px solid var(--line);color:var(--fg);border-radius:6px;padding:5px 8px;font-size:12px}
.legend{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px}
.chip{border:1px solid var(--line);border-radius:6px;padding:3px 8px;font-size:12px;background:var(--panel)}
.chip b{color:var(--gold)}.chip .pk{color:var(--mut)}.chip.neg b{color:var(--red)}
.comps{margin-top:12px;border-top:1px dashed var(--line);padding-top:10px}
.comps h2{margin:0 0 3px;font-size:13px;color:var(--fg)}
.comps .note{color:var(--mut);font-size:11px;margin-bottom:7px}
.comps .grid{display:flex;flex-wrap:wrap;gap:6px}
.comps .card{border:1px solid var(--line);border-radius:6px;padding:5px 9px;background:var(--panel);font-size:12px}
.comps .card b{color:var(--green)}.comps .card.pen b{color:var(--red)}.comps .card .ef{color:var(--fg)}
.comps .card .meta{color:var(--mut);font-size:11px;display:block;margin-top:2px}
.comps .role{border:1px solid var(--line);border-radius:8px;padding:0 5px;font-size:10px;color:var(--mut);margin-left:4px}
.chargrp{margin-bottom:9px}.chargrp .h{font-size:12px;margin:2px 0 4px}.chargrp .h b{color:var(--gold)}.chargrp .h span{color:var(--mut)}
.controls{display:flex;gap:14px;align-items:center;margin-top:12px;flex-wrap:wrap}
input[type=search]{background:var(--panel);border:1px solid var(--line);color:var(--fg);border-radius:6px;padding:7px 10px;min-width:260px}
label.tg{color:var(--mut);font-size:12px;display:flex;gap:5px;align-items:center;cursor:pointer}
.wrap{overflow:auto;max-height:calc(100vh - 24px)}
table{border-collapse:separate;border-spacing:0;width:100%}
th,td{padding:5px 9px;border-bottom:1px solid var(--line);white-space:nowrap;text-align:right}
th{position:sticky;top:0;background:var(--panel);z-index:3;font-size:11px;color:var(--mut)}
th.kh{color:var(--fg)}th .pk{display:block;color:var(--mut);font-weight:400;font-size:10px}
td.l,th.l{text-align:left}
.relic{font-weight:600}.rid{color:var(--mut);font-size:10px;font-weight:400}
.var{color:var(--mut)}
.dir{font-size:11px;padding:1px 6px;border-radius:10px;border:1px solid var(--line)}
.up{color:var(--green)}.down{color:var(--gold)}
td.base{font-variant-numeric:tabular-nums}td.cell{font-variant-numeric:tabular-nums}
.buff{background:var(--greenbg);color:var(--green)}.nerf{background:var(--redbg);color:var(--red)}
.fz{color:var(--mut)}.fzmk{color:var(--gold);font-size:10px;margin-left:3px}
.fzp{color:var(--mut)}.fzmkp{color:var(--red);font-size:10px;margin-left:3px}
.tiem{color:var(--gold);font-size:9px;margin-left:3px;opacity:.9}
.d{color:var(--mut);font-size:11px;margin-left:3px}
th.s0,td.s0{position:sticky;left:0;background:var(--bg);z-index:2}th.s0{z-index:4;background:var(--panel)}
tbody tr:hover td{background:#232733}
.count{color:var(--mut);font-size:12px;margin-top:6px}
</style></head><body>
<header>
<div class="topbar">
 <div>

<div class="comps">

<div class="count" id="count"></div>
</header>
<div class="wrap"><table>
<thead><tr id="head"></tr></thead><tbody id="body"></tbody>

    const dt=r.dir==="INCREASE"?`<span class="dir up">${t("dir_up")}</span>`:`<span class="dir down">${t("dir_down")}</span>`;
    const relCell=first?`<span class="relic">${r.rn[LANG]}</span> <span class="rid">${r.relic}</span>`:"";
    html+=`<tr><td class="l s0">${relCell}</td><td class="l var">${r.vl[LANG]}</td><td>${dt}</td><td class="base">${r.base}</td>${cells}</tr>`;
  }
  document.getElementById("body").innerHTML=html;
  document.getElementById("count").textContent=t("count").replace("{n}",relics.size).replace("{m}",rows.length);
}
function all(){chrome();render();}
document.getElementById("lang").addEventListener("change",e=>{LANG=e.target.value;try{localStorage.setItem("rf_lang",LANG);}catch(x){}all();});
["q","hideNeg","showDelta"].forEach(id=>document.getElementById(id).addEventListener("input",render));
all();
</script></body></html>
